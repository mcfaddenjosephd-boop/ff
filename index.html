<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watching You</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .photo-wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .eyes-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .eye {
      position: absolute;
      width: 7vw;
      height: 3.5vw;
      background: white;
      border-radius: 50%;
      overflow: hidden;
      mix-blend-mode: lighten;
      opacity: 0.9;
    }

    /* Tuned to FF.png — tweak by 1–2% if slightly off */
    .eye-left  { top: 36%; left: 34%; }
    .eye-right { top: 36%; left: 57%; }

    .pupil {
      position: absolute;
      width: 2.5vw;
      height: 2.5vw;
      background: #2a1a0e;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.08s ease-out;
    }

    .pupil::after {
      content: '';
      position: absolute;
      width: 35%;
      height: 35%;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      top: 15%;
      left: 15%;
    }
  </style>
</head>
<body>

  <div class="photo-wrap">
    <img src="FF.png" alt="Headshot" />

    <div class="eyes-layer">
      <div class="eye eye-left">
        <div class="pupil" id="pupilLeft"></div>
      </div>
      <div class="eye eye-right">
        <div class="pupil" id="pupilRight"></div>
      </div>
    </div>
  </div>

  <script>
    const pupils = [
      document.getElementById('pupilLeft'),
      document.getElementById('pupilRight'),
    ];

    const MAX_TRAVEL = window.innerWidth * 0.012;

    document.addEventListener('mousemove', (e) => {
      pupils.forEach((pupil) => {
        const eye = pupil.parentElement;
        const rect = eye.getBoundingClientRect();

        const eyeCx = rect.left + rect.width  / 2;
        const eyeCy = rect.top  + rect.height / 2;

        const dx = e.clientX - eyeCx;
        const dy = e.clientY - eyeCy;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

        const travel = Math.min(dist, MAX_TRAVEL);
        const ox = (dx / dist) * travel;
        const oy = (dy / dist) * travel;

        pupil.style.transform = `translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px))`;
      });
    });

    // Mobile touch support
    document.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      document.dispatchEvent(new MouseEvent('mousemove', {
        clientX: touch.clientX,
        clientY: touch.clientY,
      }));
    }, { passive: true });
  </script>

</body>
</html>
