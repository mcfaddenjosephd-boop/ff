<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watching You</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Georgia', serif;
      color: #e0e0e0;
    }

    h1 {
      font-size: 1.2rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0.5;
    }

    .photo-wrap {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(100, 180, 255, 0.25);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .eyes-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .eye {
      position: absolute;
      width: 36px;
      height: 22px;
      background: white;
      border-radius: 50%;
      overflow: hidden;
      mix-blend-mode: lighten;
      opacity: 0.85;
    }

    /* ⬇ ADJUST THESE to line up with your photo's eyes */
    .eye-left  { top: 38%; left: 33%; }
    .eye-right { top: 38%; left: 56%; }

    .pupil {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #1a1a2e;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.08s ease-out;
    }

    .pupil::after {
      content: '';
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      top: 2px;
      left: 2px;
    }

    p.hint {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      opacity: 0.3;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>

  <h1>I see you</h1>

  <div class="photo-wrap">
    <!-- Put your image file (e.g. headshot.jpg) in the same folder and update src below -->
    <img src="headshot.jpg" alt="Headshot" />

    <div class="eyes-layer">
      <div class="eye eye-left">
        <div class="pupil" id="pupilLeft"></div>
      </div>
      <div class="eye eye-right">
        <div class="pupil" id="pupilRight"></div>
      </div>
    </div>
  </div>

  <p class="hint">move your mouse around</p>

  <script>
    const pupils = [
      document.getElementById('pupilLeft'),
      document.getElementById('pupilRight'),
    ];

    const MAX_TRAVEL = 7; // max px the pupil moves from center

    document.addEventListener('mousemove', (e) => {
      pupils.forEach((pupil) => {
        const eye = pupil.parentElement;
        const rect = eye.getBoundingClientRect();

        const eyeCx = rect.left + rect.width  / 2;
        const eyeCy = rect.top  + rect.height / 2;

        const dx = e.clientX - eyeCx;
        const dy = e.clientY - eyeCy;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

        const travel = Math.min(dist, MAX_TRAVEL);
        const ox = (dx / dist) * travel;
        const oy = (dy / dist) * travel;

        pupil.style.transform = `translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px))`;
      });
    });

    // Mobile touch support
    document.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      document.dispatchEvent(new MouseEvent('mousemove', {
        clientX: touch.clientX,
        clientY: touch.clientY,
      }));
    }, { passive: true });
  </script>

</body>
</html>
